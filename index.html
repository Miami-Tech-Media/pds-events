<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDS Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f3f4f6;color:#111827;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;padding:0}

:root{
  --bg:#f3f4f6;
  --surface:#ffffff;
  --navy:#0f2044;
  --navy-dark:#091529;
  --blue:#1d4ed8;
  --blue-pale:#eff6ff;
  --blue-border:#bfdbfe;
  --ink:#111827;
  --ink-2:#374151;
  --muted:#6b7280;
  --light:#9ca3af;
  --rule:#e5e7eb;
  --rule-light:#f3f4f6;
  --cat-Social-bg:#dbeafe;    --cat-Social-tx:#1e40af;
  --cat-Growth-bg:#d1fae5;    --cat-Growth-tx:#065f46;
  --cat-Worship-bg:#ede9fe;   --cat-Worship-tx:#5b21b6;
  --cat-Service-bg:#fef3c7;   --cat-Service-tx:#92400e;
  --r:12px; --r-sm:8px;
}

/* ── HEADER ── */
header{
  background:var(--navy-dark);
  position:sticky;top:0;z-index:50;
}
.header-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:.625rem 1.5rem;
  gap:1.25rem;
}
.header-left{display:flex;align-items:center;gap:1.125rem}
.header-logo{height:90px;width:auto;display:block;flex-shrink:0}
.header-wordmark{display:flex;flex-direction:column;justify-content:center;gap:.2rem}
.header-name{font-size:17px;font-weight:700;color:#ffffff;letter-spacing:-.01em;line-height:1.2}
.header-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.42);letter-spacing:.12em;text-transform:uppercase;line-height:1}
.header-right{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);white-space:nowrap}

/* ── LAYOUT ── */
.page{
  max-width:1100px;margin:0 auto;
  display:grid;
  grid-template-columns:220px 1fr;
  gap:1.5rem;
  padding:1.5rem 1.5rem 5rem;
  align-items:start;
}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:64px;display:flex;flex-direction:column;gap:1rem}
.s-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.s-section{padding:.75rem 1rem}.mini-cal-card .s-section{padding:.625rem .875rem}
.s-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--light);margin-bottom:.625rem}

/* mini cal */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.cal-nav-btn{color:var(--muted);font-size:18px;line-height:1;padding:.1rem .3rem;border-radius:4px;border:none;background:none;cursor:pointer;transition:color .1s}
.cal-nav-btn:hover{color:var(--ink)}
.cal-month-label{font-size:13px;font-weight:600;color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:20px;grid-auto-rows:26px;gap:0;align-items:center}
.cal-dow{font-size:9px;font-weight:600;color:var(--light);display:flex;align-items:center;justify-content:center;line-height:1}
.cal-day{font-size:11px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--ink-2);cursor:default;line-height:1;position:relative}
.cal-day.has-event{cursor:pointer;font-weight:600;color:var(--blue)}
.cal-day.has-event:hover{background:var(--blue-pale)}
.cal-day.today{background:var(--blue);color:#fff;font-weight:700}
.cal-day.today.has-event::after{background:rgba(255,255,255,.7)}
.cal-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--blue)}
.cal-day.empty{pointer-events:none;opacity:0}

/* filters */
.filter-list{display:flex;flex-direction:column;gap:2px}
.f-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .5rem;border-radius:var(--r-sm);
  font-size:13px;font-weight:500;color:var(--ink-2);
  transition:background .1s;width:100%;text-align:left;
  border:none;background:transparent;font-family:'Inter',sans-serif;cursor:pointer;
}
.f-btn:hover{background:var(--rule-light)}
.f-btn.active{background:var(--blue-pale);color:var(--blue);font-weight:600}
.f-left{display:flex;align-items:center;gap:.5rem}
.f-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.f-count{font-size:11px;font-weight:600;color:var(--light);background:var(--rule-light);border-radius:100px;padding:.1rem .45rem}
.f-btn.active .f-count{background:rgba(29,78,216,.12);color:var(--blue)}

/* stats */
.qs-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0}
.qs-row:not(:last-child){border-bottom:1px solid var(--rule-light)}
.qs-label{font-size:12px;color:var(--muted)}
.qs-val{font-size:13px;font-weight:600;color:var(--ink)}

/* ── MAIN ── */
.main{min-width:0}
.list-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem;gap:1rem}
.list-title{font-size:17px;font-weight:700;color:var(--ink)}
.list-count{font-size:13px;color:var(--muted)}

/* month group */
.month-group{margin-bottom:2rem}
.month-ruler{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem}
.month-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.ruler-line{flex:1;height:1px;background:var(--rule)}

/* ── EVENT CARD ── */
.ev-card{
  background:var(--surface);
  border:1px solid var(--rule);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:.5rem;
  transition:box-shadow .15s,border-color .15s;
}
.ev-card:last-child{margin-bottom:0}
.ev-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06);border-color:#d1d5db}
.ev-card.featured{border-color:var(--blue-border);box-shadow:0 0 0 1px var(--blue-border)}

.feat-ribbon{
  background:var(--blue-pale);
  border-bottom:1px solid var(--blue-border);
  padding:.35rem 1rem .35rem calc(60px + 1rem);
  display:flex;align-items:center;gap:.4rem;
  font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.06em;text-transform:uppercase;
}
.feat-ribbon svg{width:11px;height:11px;fill:var(--blue);flex-shrink:0}

/* card row — always visible */
.ev-row{
  display:grid;grid-template-columns:60px 1fr auto;
  cursor:pointer;
}
.ev-date-col{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:.875rem .375rem;
  border-right:1px solid var(--rule);
  background:var(--rule-light);
  flex-shrink:0;
}
.ev-card.featured .ev-date-col{background:var(--blue-pale)}
.ev-card.featured .ev-day{color:var(--blue)}
.ev-card.featured .ev-wd{color:var(--blue)}
.ev-wd{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.ev-day{font-size:1.5rem;font-weight:700;line-height:1;color:var(--ink)}
.ev-mo{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-top:1px}

.ev-body{padding:.75rem 1rem;min-width:0}
.ev-cat{
  display:inline-block;
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  border-radius:100px;padding:.15rem .55rem;margin-bottom:.35rem;
}
.cat-Social{background:var(--cat-Social-bg);color:var(--cat-Social-tx)}
.cat-Growth{background:var(--cat-Growth-bg);color:var(--cat-Growth-tx)}
.cat-Worship{background:var(--cat-Worship-bg);color:var(--cat-Worship-tx)}
.cat-Service{background:var(--cat-Service-bg);color:var(--cat-Service-tx)}
.ev-title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.25;margin-bottom:.3rem}
.ev-meta{display:flex;flex-wrap:wrap;gap:.625rem}
.ev-meta-item{display:flex;align-items:center;gap:.3rem;font-size:12px;color:var(--muted)}
.ev-meta-item svg{width:12px;height:12px;stroke:var(--light);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.ev-chevron-col{
  display:flex;align-items:center;justify-content:center;
  padding:0 .875rem;
}
.ev-chevron{
  width:16px;height:16px;stroke:var(--light);fill:none;
  stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
  transition:transform .2s;
}
.ev-card.open .ev-chevron{transform:rotate(180deg)}

/* ── EXPANDED ── */
.ev-expanded{display:none;border-top:1px solid var(--rule)}
.ev-card.open .ev-expanded{display:block}

.ev-exp-inner{
  display:grid;grid-template-columns:1fr 160px;
  gap:1.25rem;
  padding:1.125rem 1rem 1.125rem calc(60px + 1rem);
}
.ev-desc{font-size:14px;line-height:1.7;color:var(--ink-2);margin-bottom:.875rem}
.ev-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.ev-chip{
  display:flex;align-items:center;gap:.35rem;
  background:var(--rule-light);border:1px solid var(--rule);
  border-radius:var(--r-sm);padding:.3rem .6rem;
  font-size:12px;color:var(--ink-2);font-weight:500;
}
.ev-chip svg{width:12px;height:12px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ev-notes{display:flex;flex-direction:column;gap:.3rem}
.ev-note{display:flex;align-items:center;gap:.4rem;font-size:13px;color:var(--ink-2)}
.ev-note svg{width:13px;height:13px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.ev-ctas{display:flex;flex-direction:column;gap:.5rem}
.btn-cal{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--blue);color:#fff;
  font-size:13px;font-weight:600;
  padding:.65rem .875rem;border-radius:var(--r-sm);
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
  transition:background .15s;white-space:nowrap;width:100%;
}
.btn-cal:hover{background:#1e40af}
.btn-cal svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-dir{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:transparent;color:var(--blue);
  font-size:13px;font-weight:600;
  padding:.65rem .875rem;border-radius:var(--r-sm);
  border:1.5px solid var(--blue-border);cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;width:100%;
}
.btn-dir:hover{background:var(--blue-pale)}
.btn-dir svg{width:14px;height:14px;stroke:var(--blue);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* empty */
.empty{
  background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);
  padding:3rem 1.5rem;text-align:center;
}
.empty svg{width:28px;height:28px;stroke:var(--rule);fill:none;stroke-width:1.5;stroke-linecap:round;margin:0 auto .75rem}
.empty p{font-size:14px;color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .page{grid-template-columns:1fr;padding:1rem 1rem 4rem}
  .sidebar{position:static;display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  .mini-cal-card{display:none}
  .ev-exp-inner{grid-template-columns:1fr;padding:1rem;gap:.875rem}
  .ev-ctas{flex-direction:row}
  .btn-cal,.btn-dir{flex:1}
}
@media(max-width:480px){
  .sidebar{grid-template-columns:1fr}
  .ev-ctas{flex-direction:column}
  .btn-cal,.btn-dir{flex:none;width:100%}
  .header-right{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="s-card mini-cal-card">
      <div class="s-section">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav-btn" id="cal-next">&#8250;</button>
        </div>
        <div class="cal-grid" id="mini-cal"></div>
      </div>
    </div>

    <div class="s-card">
      <div class="s-section">
        <p class="s-label">Event Type</p>
        <div class="filter-list" id="filter-list"></div>
      </div>
    </div>

    <div class="s-card">
      <div class="s-section">
        <p class="s-label">At a Glance</p>
        <div id="quick-stats"></div>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="list-header">
      <span class="list-title" id="list-title">All Events</span>
      <span class="list-count" id="list-count"></span>
    </div>
    <div id="event-list"></div>
  </main>

</div>

<script>
let activeFilter = 'All';
let calYear, calMonth;

const CAT_COLORS = {Social:'#2563eb',Growth:'#16a34a',Worship:'#7c3aed',Service:'#d97706',All:'#6b7280'};

function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return {
    wd: d.toLocaleString('en-US',{weekday:'short'}).toUpperCase(),
    day: d.getDate(),
    mo: d.toLocaleString('en-US',{month:'short'}).toUpperCase(),
    monthFull: d.toLocaleString('en-US',{month:'long'}),
    year: d.getFullYear(),
    long: d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),
  };
}

function makeICS(ev) {
  const ds = ev.date.replace(/-/g,'');
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
    'SUMMARY:'+ev.title+' — PDS @ Journey',
    'DTSTART:'+ds+'T190000',
    'LOCATION:'+ev.location+(ev.address?', '+ev.address:''),
    'DESCRIPTION:'+ev.description,
    'END:VEVENT','END:VCALENDAR'].join('\n');
  return URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
}

function addCal(id) {
  const ev = EVENTS.find(e=>e.id===id);
  const a = document.createElement('a');
  a.href = makeICS(ev);
  a.download = ev.title.replace(/\s+/g,'-')+'.ics';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function openDirections(ev) {
  const q = encodeURIComponent((ev.address||ev.location)+', Orlando, FL');
  window.open('https://maps.google.com/?q='+q,'_blank','noopener');
}

const SVG = {
  cal:  `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  pin:  `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  clock:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`,
  food: `<svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>`,
  party:`<svg viewBox="0 0 24 24"><path d="M5.8 11.3L2 22l10.7-3.79M4 3h.01M22 8h.01M15 2h.01M22 20h.01M20 6l-6.4 6.4M8.97 14.02L12 17l6.4-6.4"/></svg>`,
  star: `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  dir:  `<svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>`,
};

function filtered() {
  return activeFilter==='All' ? EVENTS : EVENTS.filter(e=>e.category===activeFilter);
}

/* ── render event list ── */
function renderList() {
  const evs = filtered();
  document.getElementById('list-title').textContent = activeFilter==='All' ? 'All Events' : activeFilter+' Events';
  document.getElementById('list-count').textContent = evs.length + ' upcoming';

  if (!evs.length) {
    document.getElementById('event-list').innerHTML =
      `<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No ${activeFilter.toLowerCase()} events scheduled.</p></div>`;
    return;
  }

  // group by month
  const groups = {};
  evs.forEach(ev => {
    const d = fmtDate(ev.date);
    const k = d.monthFull + ' ' + d.year;
    (groups[k] = groups[k]||[]).push(ev);
  });

  document.getElementById('event-list').innerHTML =
    Object.entries(groups).map(([month, mes]) => `
      <div class="month-group">
        <div class="month-ruler">
          <span class="month-label">${month}</span>
          <div class="ruler-line"></div>
        </div>
        ${mes.map(renderCard).join('')}
      </div>`).join('');

  // toggle listeners
  document.querySelectorAll('.ev-row').forEach(row => {
    row.addEventListener('click', () => {
      const card = row.closest('.ev-card');
      const open = card.classList.contains('open');
      document.querySelectorAll('.ev-card.open').forEach(c=>c.classList.remove('open'));
      if (!open) card.classList.add('open');
    });
  });
}

function renderCard(ev) {
  const d = fmtDate(ev.date);
  return `
  <div class="ev-card${ev.featured?' featured':''}" data-id="${ev.id}">
    ${ev.featured?`<div class="feat-ribbon">${SVG.star} Featured</div>`:''}
    <div class="ev-row">
      <div class="ev-date-col">
        <span class="ev-wd">${d.wd}</span>
        <span class="ev-day">${d.day}</span>
        <span class="ev-mo">${d.mo}</span>
      </div>
      <div class="ev-body">
        <span class="ev-cat cat-${ev.category}">${ev.category}</span>
        <p class="ev-title">${ev.title}</p>
        <div class="ev-meta">
          <span class="ev-meta-item">${SVG.clock}${ev.time}</span>
          <span class="ev-meta-item">${SVG.pin}${ev.location}</span>
        </div>
      </div>
      <div class="ev-chevron-col">
        <svg class="ev-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="ev-expanded">
      <div class="ev-exp-inner">
        <div>
          <p class="ev-desc">${ev.description}</p>
          <div class="ev-chips">
            <span class="ev-chip">${SVG.cal}${d.long}</span>
            <span class="ev-chip">${SVG.clock}${ev.time}</span>
            <span class="ev-chip">${SVG.pin}${ev.location}</span>
          </div>
          ${(ev.foodNote||ev.afterpartyNote)?`<div class="ev-notes">
            ${ev.foodNote?`<div class="ev-note">${SVG.food}<span>${ev.foodNote}</span></div>`:''}
            ${ev.afterpartyNote?`<div class="ev-note">${SVG.party}<span>${ev.afterpartyNote}</span></div>`:''}
          </div>`:''}
        </div>
        <div class="ev-ctas">
          <button class="btn-cal" onclick="event.stopPropagation();addCal(${ev.id})">${SVG.cal} Add to Calendar</button>
          <button class="btn-dir" onclick="event.stopPropagation();openDirections(EVENTS.find(e=>e.id==${ev.id}))">${SVG.dir} Directions</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── filters ── */
function renderFilters() {
  const cats = ['All',...new Set(EVENTS.map(e=>e.category))];
  document.getElementById('filter-list').innerHTML = cats.map(cat => {
    const n = cat==='All' ? EVENTS.length : EVENTS.filter(e=>e.category===cat).length;
    return `<button class="f-btn${cat===activeFilter?' active':''}" onclick="setFilter('${cat}')">
      <span class="f-left"><span class="f-dot" style="background:${CAT_COLORS[cat]||CAT_COLORS.All}"></span>${cat}</span>
      <span class="f-count">${n}</span>
    </button>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderList();
}

/* ── quick stats ── */
function renderStats() {
  const now = new Date();
  const thisMonth = EVENTS.filter(e=>{
    const d=new Date(e.date+'T00:00:00');
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;
  document.getElementById('quick-stats').innerHTML = [
    {l:'Total upcoming', v:EVENTS.length},
    {l:'This month', v:thisMonth},
    {l:'Event types', v:new Set(EVENTS.map(e=>e.category)).size},
  ].map(r=>`<div class="qs-row"><span class="qs-label">${r.l}</span><span class="qs-val">${r.v}</span></div>`).join('');
}

/* ── mini calendar ── */
function renderCal() {
  const today = new Date();
  if (calYear===undefined) { calYear=today.getFullYear(); calMonth=today.getMonth(); }
  document.getElementById('cal-month-label').textContent =
    new Date(calYear,calMonth,1).toLocaleString('en-US',{month:'long',year:'numeric'});
  const evDates = new Set(EVENTS.map(e=>e.date));
  const first = new Date(calYear,calMonth,1).getDay();
  const days = new Date(calYear,calMonth+1,0).getDate();
  let html = ['S','M','T','W','T','F','S'].map(d=>`<span class="cal-dow">${d}</span>`).join('');
  for(let i=0;i<first;i++) html+=`<span class="cal-day empty"></span>`;
  for(let d=1;d<=days;d++) {
    const iso = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const hasEv = evDates.has(iso);
    html+=`<span class="cal-day${isToday?' today':''}${hasEv?' has-event':''}">${d}</span>`;
  }
  document.getElementById('mini-cal').innerHTML = html;
}

document.getElementById('cal-prev').onclick = () => {
  if(--calMonth<0){calMonth=11;calYear--;} renderCal();
};
document.getElementById('cal-next').onclick = () => {
  if(++calMonth>11){calMonth=0;calYear++;} renderCal();
};

renderFilters();
renderList();
renderStats();
renderCal();
</script>
